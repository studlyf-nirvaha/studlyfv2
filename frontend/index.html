<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Standard | Engineering Readiness</title>
    <link rel="icon" href="/stud.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-purple: #7C3AED;
            --brand-dark: #111827;
            --brand-soft-purple: #F9FAFB;
        }

        body {
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #FFFFFF;
            color: #374151;
            overflow-x: hidden;
            width: 100%;
        }

        .font-display {
            font-family: 'Poppins', sans-serif;
        }

        .font-mono {
            font-family: 'Poppins', sans-serif;
        }

        .font-syne {
            font-family: 'Poppins', sans-serif;
        }

        .bg-grid-tech {
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(124, 58, 237, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(124, 58, 237, 0.04) 1px, transparent 1px);
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjAwIDIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC42NSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNuKSIvPjwvc3ZnPg==");
        }

        .curved-edge {
            border-radius: 1rem;
        }

        @media (min-width: 1024px) {
            .curved-edge {
                border-radius: 1.5rem;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #FFFFFF;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--brand-purple);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .animate-shine {
            animation: shine 2s infinite;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 40s linear infinite;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="text-[#374151]">
    <div class="grain"></div>
    <div id="root">
        <style>
            @keyframes boot-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }
            @keyframes boot-spin { 100% { transform: rotate(360deg); } }
            .boot-screen {
                position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
                background: radial-gradient(circle at 50% 50%, #170f1d 0%, #0d0f18 100%);
                z-index: 999999;
                color: white;
            }
            .boot-ring {
                position: relative; width: 120px; height: 120px;
                display: flex; align-items: center; justify-content: center;
            }
            .boot-ring::before {
                content: ''; position: absolute; inset: 0; border-radius: 50%;
                border: 2px solid rgba(124, 58, 237, 0.15);
            }
            .boot-ring::after {
                content: ''; position: absolute; inset: -2px; border-radius: 50%;
                border: 2px solid transparent; border-top-color: #7C3AED; border-right-color: #c084fc;
                animation: boot-spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            }
            .boot-logo {
                width: 52px; height: 52px; border-radius: 50%;
                background: url('/stud.png') center/contain no-repeat;
                animation: boot-pulse 2s ease-in-out infinite;
                background-color: white;
                box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);
            }
            .boot-text {
                position: absolute; bottom: -45px; white-space: nowrap;
                font-family: 'Poppins', sans-serif; font-size: 10px;
                letter-spacing: 0.4em; text-transform: uppercase;
                color: #a78bfa; animation: boot-pulse 2s ease-in-out infinite;
            }
        </style>
        <div class="boot-screen">
            <div class="boot-ring">
                <div class="boot-logo"></div>
                <div class="boot-text">Igniting Engine...</div>
            </div>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
